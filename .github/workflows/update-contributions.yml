name: Update Project Lists

on:
  schedule:
    - cron: "0 0 * * 1"   # every Monday at midnight UTC
  workflow_dispatch:        # manual trigger (no push trigger)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update Projects and Contributions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os, re, json, urllib.request, time

          def fetch_github(url, token):
              req = urllib.request.Request(url)
              if token:
                  req.add_header('Authorization', f'Bearer {token}')
              req.add_header('Accept', 'application/vnd.github+json')
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.loads(response.read().decode())
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return None

          def get_heuristic_score(name, description, language):
              """Calculates a fallback complexity score for unknown repositories."""
              score = 50 # Baseline
              
              # Technical keywords in name/desc (Systems/AI/Infra)
              keywords = {
                  'engine': 15, 'orchestrator': 15, 'simulator': 10, 'analyzer': 10,
                  'compiler': 20, 'database': 20, 'distributed': 15, 'system': 10,
                  'kernel': 20, 'protocol': 15, 'driver': 15, 'infrastructure': 10,
                  'ai': 10, 'llm': 10, 'model': 5, 'vision': 5
              }
              
              combined = f"{name} {description}".lower()
              for kw, val in keywords.items():
                  if kw in combined:
                      score += val
              
              # Language-based complexity
              lang_complexity = {
                  'C++': 15, 'C': 15, 'Rust': 15, 'Go': 10,
                  'Java': 5, 'Python': 5, 'TypeScript': 5
              }
              score += lang_complexity.get(language, 0)
              
              return min(max(score, 0), 99) # Keep below the manual high-prio stuff

          def update():
              user = "AniruthKarthik"
              token = os.environ.get('GH_TOKEN')
              
              if not os.path.exists('README.md'):
                  return

              # Complexity mapping (Manual overrides)
              COMPLEXITY_MAP = {
                  # Own Projects
                  'llm-orchestrator': 100,
                  'codemap': 95,
                  'nets': 90,
                  'vfi': 88,
                  'stt': 85,
                  'stocksim': 80,
                  'qrtunnel': 75,
                  'hyperparameter-analyzer': 70,
                  'gramfix': 65,
                  'Campus_Navigation_System': 60,
                  'paper-no-yapper': 50,
                  'No_Time_To_Die': 45,
                  'esphost': 40,
                  'blogs': 30,
                  'nvim-config': 25,
                  'project-sandbox': 10,
                  'proof-i-code': 5,
                  # Contributions
                  'dolthub/doltgresql': 100,
                  'purpleidea/mgmt': 95,
                  'gomods/athens': 90,
                  'hasmcp/hasmcp-ce': 85,
                  'IDEA-Amrita/NodeShare': 80,
                  'cin-and-cout/png-tree': 75,
                  'openml/openml-python': 70,
                  'collective/icalendar': 65,
                  'cin-and-cout/eco-route-optimizer': 60,
                  'SH-Nihil-Mukkesh-25/Stemly': 50,
                  'arhamgarg/DSA': 40
              }

              DESCRIPTION_MAP = {
                  'llm-orchestrator': 'Production-grade execution engine for transforming declarative workflows into robust, dynamically executed DAGs for AI agents.',
                  'codemap': 'Codebase onboarding and visualization system designed to surface architectural context by analyzing execution paths and file relationships.',
                  'nets': 'Hybrid puzzle architecture integrating a JavaFX frontend with a high-performance C++ backend to implement graph theory and minimum spanning tree mechanics.',
                  'vfi': 'High-performance motion estimation and frame interpolation suite leveraging a multi-scale pyramid estimator optimized for low-latency streaming.',
                  'stt': 'Lightweight, secure, cursor-aware offline speech-to-text integration utilizing whisper.cpp for seamless desktop audio-to-text injection.',
                  'stocksim': 'Full-stack time-travel trading simulator enabling the realistic backtesting of financial strategies using historical market data.',
                  'qrtunnel': 'Cross-platform reverse-tunneling utility enabling instantaneous file transfers via QR codes over NAT-traversed connections and local LAN.',
                  'hyperparameter-analyzer': 'Command-line interface utility for evaluating and optimizing machine learning model hyperparameters in image segmentation tasks.',
                  'gramfix': 'System-wide grammar correction utility utilizing a hybrid architecture of ultra-fast cloud-based LLM APIs and offline LanguageTool fallbacks.',
                  'Campus_Navigation_System': 'Pathfinding visualizer utilizing Dijkstra\\'s Algorithm within a Tkinter interface for efficient route calculation across customizable map layouts.',
                  'paper-no-yapper': 'Automated research paper analysis system employing ontology-based term matching and fuzzy detection to extract core domains and methodologies.',
                  'No_Time_To_Die': 'C++ survival game built on Raylib featuring dynamic time mechanics where movement natively accelerates the game loop.',
                  'esphost': 'Experimental IoT framework focused on ESP8266 and ESP32 hosting communication protocols.',
                  'blogs': 'Hugo-based digital garden housing technical write-ups and architectural deep dives.',
                  'nvim-config': 'Personalized Neovim environment heavily optimized via NvChad for enhanced developer ergonomics.',
                  'project-sandbox': 'A dedicated repository serving as an archive for technical explorations, discontinued prototypes, and specific architectural experiments.',
                  'proof-i-code': 'Automated activity tracker designed to maintain continuous integration logs and developer proof-of-work.',
                  'dolthub/doltgresql': 'Version-controlled SQL database introducing Git-like branching, merging, and cloning capabilities directly into the PostgreSQL ecosystem.',
                  'purpleidea/mgmt': 'Next-generation distributed configuration management engine built on a real-time, event-driven, parallel execution architecture.',
                  'gomods/athens': 'Highly available Go module proxy and datastore designed to provide immutable caching for external dependencies.',
                  'hasmcp/hasmcp-ce': 'No-code Model Context Protocol (MCP) gateway engine that automates the transformation of standard OpenAPI endpoints into functional MCP servers.',
                  'IDEA-Amrita/NodeShare': 'Cross-platform peer-to-peer distributed computing daemon architected for remote workload execution via shared CPU and memory.',
                  'cin-and-cout/png-tree': 'C++ performance case study evaluating vector-based pixel storage against advanced quadtree SegmentTree implementations with lazy propagation.',
                  'openml/openml-python': 'Official Python SDK for the OpenML platform, enabling standardized interaction with machine learning datasets and benchmark environments.',
                  'collective/icalendar': 'Robust Python parsing and generation library for RFC 5545 compliant iCalendar specifications.',
                  'cin-and-cout/eco-route-optimizer': 'Intelligent routing platform that calculates navigation paths by analyzing elevation gradients and traffic to minimize carbon emissions.',
                  'SH-Nihil-Mukkesh-25/Stemly': 'AI-powered STEM platform utilizing FastAPI and LangChain to transform static diagrams into interactive simulations.',
                  'arhamgarg/DSA': 'Comprehensive suite of object-oriented data structures and algorithmic implementations serving as a foundational reference.'
              }

              def sort_key(name, item_data=None):
                  if name in COMPLEXITY_MAP:
                      score = COMPLEXITY_MAP[name]
                  elif item_data:
                      # Heuristic for new/unknown repos
                      score = get_heuristic_score(
                          name, 
                          item_data.get('description', ''), 
                          item_data.get('language', '')
                      )
                  else:
                      score = 0
                  return (-score, name.lower())

              # 1. Fetch ALL Own Repos (excluding forks)
              repos_data = fetch_github(f"https://api.github.com/users/{user}/repos?per_page=100&sort=updated", token)
              own_projects = {}
              own_metadata = {}
              if repos_data:
                  for repo in repos_data:
                      if repo['fork'] or repo['name'] == user:
                          continue
                      name = repo['name']
                      desc = DESCRIPTION_MAP.get(name) or repo['description'] or "No description provided."
                      url = repo['html_url']
                      own_projects[name] = f"| [**{name}**]({url}) | {desc} |"
                      own_metadata[name] = {'description': desc, 'language': repo['language']}

              # 2. Fetch ALL External OS Contributions
              prs_data = fetch_github(f"https://api.github.com/search/issues?q=type:pr+author:{user}+is:merged+-user:{user}+-repo:firstcontributions/first-contributions&per_page=100", token)
              commits_data = fetch_github(f"https://api.github.com/search/commits?q=author:{user}+is:public+-user:{user}+sort:author-date-desc&per_page=100", token)
              
              contrib_projects = {}
              contrib_metadata = {}
              repo_names = set()
              
              if prs_data and 'items' in prs_data:
                  # Collect unique repo names from PRs
                  for item in prs_data['items']:
                      repo_url = item['repository_url']
                      repo_name = "/".join(repo_url.split('/')[-2:])
                      repo_names.add(repo_name)
                      
              if commits_data and 'items' in commits_data:
                  for item in commits_data['items']:
                      repo_name = item['repository']['full_name']
                      if 'first-contribution' in repo_name.lower():
                          continue
                      repo_names.add(repo_name)
                      
              # Ensure all external repos from COMPLEXITY_MAP are included
              for mapped_repo in COMPLEXITY_MAP.keys():
                  if '/' in mapped_repo and not mapped_repo.startswith(user + '/'):
                      repo_names.add(mapped_repo)
                  
              # Fetch full repo metadata for each repo to get the description
              for repo_name in repo_names:
                  repo_info = fetch_github(f"https://api.github.com/repos/{repo_name}", token)
                  if repo_info:
                      desc = DESCRIPTION_MAP.get(repo_name) or repo_info.get('description') or "No description provided."
                      link = repo_info.get('html_url')
                      contrib_projects[repo_name] = f"| [**{repo_name}**]({link}) | {desc} |"
                      contrib_metadata[repo_name] = {'description': desc, 'language': repo_info.get('language', '')}
                  else:
                      desc = DESCRIPTION_MAP.get(repo_name) or "No description provided."
                      link = f"https://github.com/{repo_name}"
                      contrib_projects[repo_name] = f"| [**{repo_name}**]({link}) | {desc} |"
                      contrib_metadata[repo_name] = {'description': desc, 'language': ''}
                  time.sleep(0.1) # Respect rate limits

              # 3. Sort lists
              sorted_own = sorted(own_projects.keys(), key=lambda n: sort_key(n, own_metadata.get(n)))
              sorted_contribs = sorted(contrib_projects.keys(), key=lambda n: sort_key(n, contrib_metadata.get(n)))

              # 4. Generate PROJECTS.md
              projects_content = f"# Full Project List\n\n"
              projects_content += "## All Personal Projects\n\n| Project | Description |\n| --- | --- |\n"
              projects_content += "\n".join(own_projects[name] for name in sorted_own) + "\n\n"
              projects_content += "## All Open Source / Other Contributions\n\n| Repository | Description |\n| --- | --- |\n"
              projects_content += "\n".join(contrib_projects[name] for name in sorted_contribs) + "\n"
              
              with open('PROJECTS.md', 'w') as f:
                  f.write(projects_content)

              # 5. Update README.md (Top 5 only)
              with open('README.md', 'r') as f:
                  readme_content = f.read()

              def update_block(content, start_marker, end_marker, entries, sorted_names, header, footer_link):
                  top_5 = sorted_names[:5]
                  table = f"{header}\n"
                  table += "\n".join(entries[name] for name in top_5)
                  table += f"\n\n[**View full list ({len(sorted_names)})**]({footer_link})"
                  new_block = f"{start_marker}\n{table}\n{end_marker}"
                  return re.sub(f'{start_marker}.*?{end_marker}', new_block, content, flags=re.DOTALL)

              readme_content = update_block(
                  readme_content, '<!-- SELECTED:START -->', '<!-- SELECTED:END -->',
                  own_projects, sorted_own, 
                  "| Project | Description |\n| --- | --- |", 
                  "PROJECTS.md#all-personal-projects"
              )

              readme_content = update_block(
                  readme_content, '<!-- CONTRIBUTIONS:START -->', '<!-- CONTRIBUTIONS:END -->',
                  contrib_projects, sorted_contribs, 
                  "| Repository | Description |\n| --- | --- |", 
                  "PROJECTS.md#all-open-source--other-contributions"
              )

              with open('README.md', 'w') as f:
                  f.write(readme_content)

          if __name__ == "__main__":
              update()
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md PROJECTS.md
          git diff --quiet --staged && echo "No changes" || (git commit -m "chore: use repo descriptions for open source contributions" && git push)
