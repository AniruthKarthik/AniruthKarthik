name: Update Contributions

on:
  schedule:
    - cron: "0 0 * * 1"   # every Monday at midnight UTC
  push:
    branches: [ main ]
  workflow_dispatch:        # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update contributions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os, re, json, urllib.request

          def fetch_merged_prs(user, token):
              # Exclude specific tutorial repos in the query
              url = f"https://api.github.com/search/issues?q=type:pr+author:{user}+is:merged+-user:{user}+-repo:firstcontributions/first-contributions&per_page=100"
              req = urllib.request.Request(url)
              req.add_header('Authorization', f'Bearer {token}')
              req.add_header('Accept', 'application/vnd.github+json')
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.loads(response.read().decode()).get('items', [])
              except Exception as e:
                  print(f"Error fetching PRs: {e}")
                  return []

          def update():
              user = "AniruthKarthik"
              token = os.environ.get('GH_TOKEN')
              
              if not os.path.exists('README.md'):
                  return

              # Complexity mapping (higher = more complex/cool)
              COMPLEXITY_MAP = {
                  'dolthub/doltgresql': 100,
                  'purpleidea/mgmt': 95,
                  'gomods/athens': 90,
                  'hasmcp/hasmcp-ce': 85,
                  'IDEA-Amrita/NodeShare': 80,
                  'cin-and-cout/png-tree': 75,
                  'openml/openml-python': 70,
                  'collective/icalendar': 65,
                  'cin-and-cout/Eco-Route Optimizer': 60,
                  'SH-Nihil-Mukkesh-25/Stemly': 50,
                  'arhamgarg/DSA': 40
              }

              with open('README.md', 'r') as f:
                  content = f.read()
              
              # Extract existing table entries
              entries = {}
              match = re.search(r'<!-- CONTRIBUTIONS:START -->\s*(.*?)\s*<!-- CONTRIBUTIONS:END -->', content, re.DOTALL)
              if match:
                  table_content = match.group(1)
                  rows = table_content.strip().split('\n')
                  for row in rows:
                      if '|' not in row or '---' in row or 'Repository' in row:
                          continue
                      repo_match = re.search(r'\[\*\*(.*?)\*\*\]', row)
                      if repo_match:
                          repo_name = repo_match.group(1)
                          # Explicitly exclude tutorial repos even if they exist in README
                          if repo_name == "firstcontributions/first-contributions":
                              continue
                          entries[repo_name] = row.strip()

              # Fetch new ones from GitHub API
              prs = fetch_merged_prs(user, token)
              for pr in prs:
                  repo_url = pr['repository_url']
                  repo_name = "/".join(repo_url.split('/')[-2:])
                  if repo_name not in entries:
                      link = f"https://github.com/{repo_name}"
                      entries[repo_name] = f"| [**{repo_name}**]({link}) | {pr['title']} |"

              # Sort all entries by complexity score, then alphabetically
              def sort_key(repo_name):
                  score = COMPLEXITY_MAP.get(repo_name, 0)
                  return (-score, repo_name.lower())

              sorted_repo_names = sorted(entries.keys(), key=sort_key)
              table_body = "\n".join(entries[name] for name in sorted_repo_names)
              
              table_header = "| Repository | About |\n| --- | --- |"
              table = f"{table_header}\n{table_body}"
              
              updated_block = f"<!-- CONTRIBUTIONS:START -->\n{table}\n<!-- CONTRIBUTIONS:END -->"
              updated_content = re.sub(
                  r'<!-- CONTRIBUTIONS:START -->.*?<!-- CONTRIBUTIONS:END -->', 
                  updated_block, 
                  content, 
                  flags=re.DOTALL
              )
              
              with open('README.md', 'w') as f:
                  f.write(updated_content)

          if __name__ == "__main__":
              update()
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git add README.md && git commit -m "chore: update contributions list" && git push)
