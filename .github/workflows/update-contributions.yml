name: Update Project Lists

on:
  schedule:
    - cron: "0 0 * * 1"   # every Monday at midnight UTC
  push:
    branches: [ main ]
  workflow_dispatch:        # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update Projects and Contributions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os, re, json, urllib.request

          def fetch_github(url, token):
              req = urllib.request.Request(url)
              req.add_header('Authorization', f'Bearer {token}')
              req.add_header('Accept', 'application/vnd.github+json')
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.loads(response.read().decode())
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return None

          def update():
              user = "AniruthKarthik"
              token = os.environ.get('GH_TOKEN')
              
              if not os.path.exists('README.md'):
                  return

              # Complexity mapping
              COMPLEXITY_MAP = {
                  # Own Projects
                  'llm-orchestrator': 100,
                  'codemap': 95,
                  'stocksim': 90,
                  'qrtunnel': 85,
                  'nets': 80,
                  'gramfix': 75,
                  'stt': 70,
                  'vfi': 65,
                  # Contributions
                  'dolthub/doltgresql': 100,
                  'purpleidea/mgmt': 95,
                  'gomods/athens': 90,
                  'hasmcp/hasmcp-ce': 85,
                  'IDEA-Amrita/NodeShare': 80,
                  'cin-and-cout/png-tree': 75,
                  'openml/openml-python': 70,
                  'collective/icalendar': 65,
                  'cin-and-cout/Eco-Route Optimizer': 60,
                  'SH-Nihil-Mukkesh-25/Stemly': 50,
                  'arhamgarg/DSA': 40
              }

              def sort_key(name):
                  score = COMPLEXITY_MAP.get(name, 0)
                  return (-score, name.lower())

              # 1. Fetch ALL Own Repos (excluding forks)
              repos_data = fetch_github(f"https://api.github.com/users/{user}/repos?per_page=100&sort=updated", token)
              own_projects = {}
              if repos_data:
                  for repo in repos_data:
                      if repo['fork'] or repo['name'] == user: # Skip forks and profile README
                          continue
                      name = repo['name']
                      desc = repo['description'] or "No description provided."
                      url = repo['html_url']
                      own_projects[name] = f"| [**{name}**]({url}) | {desc} |"

              # 2. Fetch ALL External OS Contributions
              prs_data = fetch_github(f"https://api.github.com/search/issues?q=type:pr+author:{user}+is:merged+-user:{user}+-repo:firstcontributions/first-contributions&per_page=100", token)
              contrib_projects = {}
              if prs_data and 'items' in prs_data:
                  for item in prs_data['items']:
                      repo_url = item['repository_url']
                      repo_name = "/".join(repo_url.split('/')[-2:])
                      if repo_name not in contrib_projects:
                          link = f"https://github.com/{repo_name}"
                          contrib_projects[repo_name] = f"| [**{repo_name}**]({link}) | {item['title']} |"

              # 3. Sort lists
              sorted_own = sorted(own_projects.keys(), key=sort_key)
              sorted_contribs = sorted(contrib_projects.keys(), key=sort_key)

              # 4. Generate PROJECTS.md
              projects_content = f"# Full Project List\n\n"
              projects_content += "## All Personal Projects\n\n| Project | Description |\n| --- | --- |\n"
              projects_content += "\n".join(own_projects[name] for name in sorted_own) + "\n\n"
              projects_content += "## All Open Source Contributions\n\n| Repository | About |\n| --- | --- |\n"
              projects_content += "\n".join(contrib_projects[name] for name in sorted_contribs) + "\n"
              
              with open('PROJECTS.md', 'w') as f:
                  f.write(projects_content)

              # 5. Update README.md (Top 5 only)
              with open('README.md', 'r') as f:
                  readme_content = f.read()

              def update_block(content, start_marker, end_marker, entries, sorted_names, header, footer_link):
                  top_5 = sorted_names[:5]
                  table = f"{header}\n"
                  table += "\n".join(entries[name] for name in top_5)
                  table += f"\n\n[**View full list ({len(sorted_names)})**]({footer_link})"
                  new_block = f"{start_marker}\n{table}\n{end_marker}"
                  return re.sub(f'{start_marker}.*?{end_marker}', new_block, content, flags=re.DOTALL)

              # Update Selected Projects
              readme_content = update_block(
                  readme_content, '<!-- SELECTED:START -->', '<!-- SELECTED:END -->',
                  own_projects, sorted_own, 
                  "| Project | Description |\n| --- | --- |", 
                  "PROJECTS.md#all-personal-projects"
              )

              # Update Contributions
              readme_content = update_block(
                  readme_content, '<!-- CONTRIBUTIONS:START -->', '<!-- CONTRIBUTIONS:END -->',
                  contrib_projects, sorted_contribs, 
                  "| Repository | About |\n| --- | --- |", 
                  "PROJECTS.md#all-open-source-contributions"
              )

              with open('README.md', 'w') as f:
                  f.write(readme_content)

          if __name__ == "__main__":
              update()
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md PROJECTS.md
          git diff --quiet --staged && echo "No changes" || (git commit -m "chore: update full project lists and README top 5" && git push)
